<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signal Market - Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface-elevated: #1a1a24;
      --border: #2e2e3a;
      --primary: #00ff88;
      --primary-dim: #00cc6a;
      --accent: #6366f1;
      --text: #fff;
      --text-dim: #888;
      --text-sub: #666;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
    }
    
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image: 
        radial-gradient(ellipse at 20% 0%, rgba(0, 255, 136, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 100%, rgba(99, 102, 241, 0.08) 0%, transparent 50%);
    }
    
    /* Mobile Menu */
    .mobile-menu-btn {
      display: none;
      background: none;
      border: none;
      color: var(--text);
      font-size: 24px;
      cursor: pointer;
      padding: 8px;
    }
    
    .header {
      background: rgba(10, 10, 15, 0.9);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .logo {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--primary) 0%, #00ccff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .status {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 13px;
      color: var(--text-dim);
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: var(--success);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 8px var(--success); }
      50% { opacity: 0.5; box-shadow: none; }
    }
    
    .main {
      padding: 70px 16px 24px;
      max-width: 1400px;
      margin: 0 auto;
    }
    
    /* Quick Stats */
    .quick-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 24px;
    }
    
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      transition: all 0.3s;
    }
    
    .stat-card:hover {
      border-color: var(--primary);
      transform: translateY(-2px);
    }
    
    .stat-value {
      font-size: 28px;
      font-weight: 700;
      font-family: 'Space Grotesk', sans-serif;
      color: var(--primary);
    }
    
    .stat-label {
      font-size: 12px;
      color: var(--text-dim);
      margin-top: 4px;
    }
    
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 20px;
    }
    
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 20px;
      transition: all 0.3s;
    }
    
    .card:hover {
      border-color: rgba(0, 255, 136, 0.3);
    }
    
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .card-badge {
      font-size: 11px;
      padding: 4px 10px;
      background: rgba(0, 255, 136, 0.1);
      color: var(--primary);
      border-radius: 100px;
    }
    
    /* Event Items */
    .event-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      background: var(--surface-elevated);
      border-radius: 12px;
      margin-bottom: 10px;
      transition: all 0.2s;
      cursor: pointer;
    }
    
    .event-item:hover {
      transform: translateX(4px);
      border-left: 3px solid var(--primary);
      background: rgba(0, 255, 136, 0.05);
    }
    
    .event-topic {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }
    
    .event-evidence {
      font-size: 12px;
      color: var(--text-dim);
    }
    
    .stage-badge {
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      font-weight: 500;
    }
    
    .stage-emerging { background: rgba(99, 102, 241, 0.2); color: #818cf8; }
    .stage-forming { background: rgba(0, 255, 136, 0.2); color: var(--primary); }
    .stage-accelerating { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .stage-peak { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
    .stage-fading { background: rgba(136, 136, 136, 0.2); color: var(--text-dim); }
    
    /* Probability Bars */
    .prob-bar {
      height: 8px;
      background: var(--border);
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }
    
    .prob-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 4px;
      transition: width 0.5s ease;
      position: relative;
    }
    
    .prob-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      animation: shimmer 2s infinite;
    }
    
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    
    .prob-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
    }
    
    .prob-label {
      font-size: 11px;
      color: var(--text-dim);
    }
    
    /* Lens Tabs */
    .lens-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }
    
    .lens-tab {
      padding: 10px 18px;
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      border-radius: 10px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .lens-tab:hover, .lens-tab.active {
      border-color: var(--primary);
      background: rgba(0, 255, 136, 0.1);
      color: var(--primary);
    }
    
    .refresh-btn {
      background: var(--surface-elevated);
      border: 1px solid var(--border);
      color: var(--text-dim);
      padding: 8px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    
    .refresh-btn:hover {
      border-color: var(--primary);
      color: var(--primary);
    }
    
    .refresh-btn.loading {
      pointer-events: none;
      opacity: 0.7;
    }
    
    .footer {
      text-align: center;
      padding: 24px;
      color: var(--text-dim);
      font-size: 12px;
    }
    
    .time { color: var(--text-sub); font-size: 12px; }
    
    /* Mini Chart */
    .mini-chart {
      height: 40px;
      display: flex;
      align-items: flex-end;
      gap: 2px;
    }
    
    .chart-bar {
      flex: 1;
      background: var(--primary);
      border-radius: 2px;
      opacity: 0.6;
      transition: all 0.3s;
    }
    
    .chart-bar:hover {
      opacity: 1;
    }
    
    /* Health Indicators */
    .health-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      background: var(--surface-elevated);
      border-radius: 10px;
      margin-bottom: 8px;
    }
    
    .health-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
    }
    
    .health-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }
    
    .health-dot.healthy { background: var(--success); }
    .health-dot.warning { background: var(--warning); }
    .health-dot.error { background: var(--danger); }
    
    /* Responsive */
    @media (max-width: 768px) {
      .mobile-menu-btn {
        display: block;
      }
      
      .header {
        padding: 10px 16px;
      }
      
      .logo {
        font-size: 16px;
      }
      
      .status span:last-child {
        display: none;
      }
      
      .main {
        padding: 60px 12px 16px;
      }
      
      .quick-stats {
        grid-template-columns: repeat(2, 1fr);
        gap: 10px;
      }
      
      .stat-card {
        padding: 12px;
      }
      
      .stat-value {
        font-size: 22px;
      }
      
      .grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }
      
      .card {
        padding: 16px;
      }
      
      .lens-tabs {
        gap: 6px;
      }
      
      .lens-tab {
        padding: 8px 12px;
        font-size: 12px;
      }
      
      .event-item {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }
      
      .event-item .stage-badge {
        align-self: flex-start;
      }
    }
    
    @media (max-width: 480px) {
      .quick-stats {
        grid-template-columns: 1fr 1fr;
      }
      
      .card-title {
        font-size: 12px;
      }
    }
    
    /* Empty State */
    .empty-state {
      text-align: center;
      padding: 30px;
      color: var(--text-dim);
    }
    
    .empty-state svg {
      width: 48px;
      height: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }
  </style>
</head>
<body>
  <header class="header">
    <div class="logo">◈ Signal Market</div>
    <div class="status">
      <span class="status-dot"></span>
      <span>Live</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadAll()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
        </svg>
        刷新
      </button>
    </div>
  </header>
  
  <main class="main">
    <!-- Quick Stats -->
    <div class="quick-stats">
      <div class="stat-card">
        <div class="stat-value" id="stat-events">0</div>
        <div class="stat-label">活跃事件</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-predictions">0</div>
        <div class="stat-label">预测信号</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-avg-prob">0%</div>
        <div class="stat-label">平均概率</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="stat-health">✓</div>
        <div class="stat-label">系统状态</div>
      </div>
    </div>
    
    <!-- Lens Tabs -->
    <div class="lens-tabs">
      <button class="lens-tab active" onclick="switchLens('lens_a_stock')">📈 A股板块</button>
      <button class="lens-tab" onclick="switchLens('lens_us_macro')">🌎 美股宏观</button>
      <button class="lens-tab" onclick="switchLens('lens_crypto_event')">₿ 加密货币</button>
    </div>
    
    <!-- Main Grid -->
    <div class="grid">
      <!-- Events -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">🎯 Active Events</span>
          <span class="card-badge" id="event-count">0 events</span>
        </div>
        <div id="events-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <path d="M12 6v6l4 2"/>
            </svg>
            <div>加载中...</div>
          </div>
        </div>
      </div>
      
      <!-- Predictions -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📊 Probability Forecast</span>
          <span class="card-badge">7-Day</span>
        </div>
        <div id="predictions-list">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 3v18h18"/>
              <path d="M18 9l-5 5-4-4-3 3"/>
            </svg>
            <div>加载中...</div>
          </div>
        </div>
      </div>
      
      <!-- Lens Brief -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">📋 Daily Brief</span>
          <span class="card-badge" id="lens-name">lens_a_stock</span>
        </div>
        <div id="lens-brief">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
            </svg>
            <div>加载中...</div>
          </div>
        </div>
      </div>
      
      <!-- Health -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">💚 System Health</span>
        </div>
        <div id="health-status">
          <div class="empty-state">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            <div>加载中...</div>
          </div>
        </div>
      </div>
    </div>
    
    <div class="footer">
      <p>最后更新: <span id="last-updated">-</span></p>
      <p class="time">Signal Market © 2026</p>
    </div>
  </main>
  
  <script>
    const API_BASE = 'http://localhost:3000';
    let currentLens = 'lens_a_stock';
    
    // Loading state
    function setLoading(loading) {
      const btn = document.getElementById('refreshBtn');
      if (loading) {
        btn.classList.add('loading');
      } else {
        btn.classList.remove('loading');
      }
    }
    
    async function fetchJSON(url) {
      try {
        const res = await fetch(url);
        if (!res.ok) return null;
        return await res.json();
      } catch(e) {
        console.error(url, e);
        return null;
      }
    }
    
    // Generate mini chart bars
    function generateMiniChart(data, maxVal = null) {
      const max = maxVal || Math.max(...data, 1);
      return data.map(v => 
        `<div class="chart-bar" style="height:${Math.max(4, (v / max) * 100)}%"></div>`
      ).join('');
    }
    
    async function loadEvents() {
      const data = await fetchJSON(`${API_BASE}/events`);
      if (!data) return;
      
      const list = document.getElementById('events-list');
      const count = data.events?.length || 0;
      
      document.getElementById('event-count').textContent = `${count} events`;
      document.getElementById('stat-events').textContent = count;
      
      if (!data.events || data.events.length === 0) {
        list.innerHTML = '<div class="empty-state"><div>暂无事件</div></div>';
        return;
      }
      
      // Generate mock chart data for visualization
      const mockHistory = () => Array.from({length: 12}, () => Math.random() * 100);
      
      list.innerHTML = data.events.slice(0, 6).map(e => `
        <div class="event-item">
          <div style="flex:1">
            <div class="event-topic">${e.topic}</div>
            <div class="event-evidence">${e.evidence_refs?.length || 0} 个证据来源</div>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
            <div class="mini-chart">${generateMiniChart(mockHistory())}</div>
            <span class="stage-badge stage-${e.stage}">${e.stage}</span>
          </div>
        </div>
      `).join('');
    }
    
    async function loadPredictions() {
      const data = await fetchJSON(`${API_BASE}/predictions`);
      if (!data) return;
      
      const list = document.getElementById('predictions-list');
      const predictions = data.predictions || [];
      
      document.getElementById('stat-predictions').textContent = predictions.length;
      
      // Calculate average probability
      if (predictions.length > 0) {
        const avgProb = predictions.reduce((sum, p) => sum + (p.probability_pct || 0), 0) / predictions.length;
        document.getElementById('stat-avg-prob').textContent = `${Math.round(avgProb * 100)}%`;
      }
      
      if (predictions.length === 0) {
        list.innerHTML = '<div class="empty-state"><div>暂无预测</div></div>';
        return;
      }
      
      list.innerHTML = predictions.slice(0, 5).map(p => {
        const prob = p.probability_pct || 0;
        const probPct = Math.round(prob * 100);
        // Generate trend chart based on probability
        const trendData = Array.from({length: 12}, (_, i) => prob * 100 * (0.7 + Math.random() * 0.6));
        
        return `
          <div class="event-item">
            <div style="flex:1;padding-right:12px">
              <div class="event-topic">${p.topic}</div>
              <div class="prob-bar">
                <div class="prob-fill" style="width:${probPct}%"></div>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
              <div class="mini-chart">${generateMiniChart(trendData, 100)}</div>
              <div style="text-align:right">
                <div class="prob-value">${probPct}%</div>
                <div class="prob-label">7天</div>
              </div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    async function loadLensBrief() {
      document.getElementById('lens-name').textContent = currentLens;
      
      const data = await fetchJSON(`${API_BASE}/lenses/${currentLens}/daily-brief`);
      if (!data) return;
      
      const list = document.getElementById('lens-brief');
      const summary = data.stage_summary || [];
      
      if (summary.length === 0) {
        list.innerHTML = '<div class="empty-state"><div>暂无数据</div></div>';
        return;
      }
      
      list.innerHTML = summary.slice(0, 4).map(s => {
        const prob = s.probability || 0;
        const probPct = Math.round(prob * 100);
        
        return `
          <div class="event-item">
            <div style="flex:1">
              <div class="event-topic">${s.topic}</div>
              <div class="prob-bar">
                <div class="prob-fill" style="width:${probPct}%"></div>
              </div>
            </div>
            <div style="text-align:right">
              <span class="stage-badge stage-${s.current_stage}">${s.current_stage}</span>
              <div class="prob-label" style="margin-top:6px">P=${probPct}%</div>
            </div>
          </div>
        `;
      }).join('');
    }
    
    async function loadHealth() {
      const data = await fetchJSON(`${API_BASE}/signals/health`);
      if (!data) {
        document.getElementById('stat-health').textContent = '!';
        document.getElementById('stat-health').style.color = 'var(--warning)';
        return;
      }
      
      const list = document.getElementById('health-status');
      const isHealthy = data.status === 'healthy';
      
      document.getElementById('stat-health').textContent = isHealthy ? '✓' : '!';
      document.getElementById('stat-health').style.color = isHealthy ? 'var(--success)' : 'var(--warning)';
      
      const statusClass = isHealthy ? 'healthy' : 'warning';
      const statusText = isHealthy ? '健康' : '警告';
      
      list.innerHTML = `
        <div class="health-item">
          <div class="health-label">
            <span class="health-dot ${statusClass}"></span>
            系统状态
          </div>
          <span class="stage-badge" style="background:${isHealthy ? 'rgba(34,197,94,0.2)' : 'rgba(245,158,11,0.2)'};color:${isHealthy ? 'var(--success)' : 'var(--warning)'}">${statusText}</span>
        </div>
        <div class="health-item">
          <div class="health-label">
            <span class="health-dot ${data.updates_today > 0 ? 'healthy' : 'warning'}"></span>
            今日更新
          </div>
          <span style="font-weight:600">${data.updates_today || 0}</span>
        </div>
        <div class="health-item">
          <div class="health-label">
            <span class="health-dot ${data.checks?.events ? 'healthy' : 'error'}"></span>
            事件监控
          </div>
          <span style="color:var(--text-dim)">${data.checks?.events ? '✅ 运行中' : '❌ 停止'}</span>
        </div>
        <div class="health-item">
          <div class="health-label">
            <span class="health-dot ${data.checks?.predictions ? 'healthy' : 'warning'}"></span>
            预测引擎
          </div>
          <span style="color:var(--text-dim)">${data.checks?.predictions ? '✅ 运行中' : '⚠️ 空闲'}</span>
        </div>
      `;
    }
    
    function switchLens(lens) {
      currentLens = lens;
      document.querySelectorAll('.lens-tab').forEach(t => t.classList.remove('active'));
      // Find the clicked tab
      const tabs = document.querySelectorAll('.lens-tab');
      tabs.forEach(t => {
        if (t.textContent.includes(lens.replace('lens_', '').replace('_', ' '))) {
          t.classList.add('active');
        }
      });
      loadLensBrief();
    }
    
    async function loadAll() {
      setLoading(true);
      try {
        await Promise.all([
          loadEvents(),
          loadPredictions(),
          loadLensBrief(),
          loadHealth()
        ]);
        document.getElementById('last-updated').textContent = new Date().toLocaleString('zh-CN');
      } finally {
        setLoading(false);
      }
    }
    
    // Initial load
    loadAll();
    
    // Auto refresh every 30s
    setInterval(loadAll, 30000);
  </script>
</body>
</html>
