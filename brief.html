<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Daily Intelligence Brief — Signal Market</title>
  <meta name="description" content="Daily AI intelligence brief. Top signals ranked by urgency and confidence.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/design-system.css">
  <style>
    .brief-layout { max-width: 800px; margin: 0 auto; padding: 0 var(--space-6); }

    /* ── Action bar ─────────────────────────────────────────────── */
    .brief-actions {
      display: flex; gap: var(--space-3); margin-bottom: var(--space-6); padding-top: var(--space-4); flex-wrap: wrap;
    }
    .action-btn {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: var(--surface-mid); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); font-size: var(--text-sm);
      color: var(--text-primary); cursor: pointer; transition: all 0.15s;
      text-decoration: none;
    }
    .action-btn:hover { background: var(--surface-high); border-color: var(--brand); }
    .action-btn svg { width: 16px; height: 16px; }
    .filter-toggle {
      display: inline-flex; align-items: center; gap: var(--space-2);
      padding: var(--space-2) var(--space-4);
      background: var(--surface-mid); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); font-size: var(--text-sm);
      color: var(--text-primary); cursor: pointer; transition: all 0.15s;
      user-select: none;
    }
    .filter-toggle.active {
      background: rgba(239, 68, 68, 0.15); border-color: #ef4444;
    }
    .filter-toggle input { display: none; }

    /* ── Header ─────────────────────────────────────────────── */
    .brief-header { padding: var(--space-8) 0 var(--space-6); border-bottom: 2px solid var(--border-subtle); }
    .brief-date {
      font-family: var(--font-mono); font-size: var(--text-xs);
      color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.1em;
      margin-bottom: var(--space-2); display: flex; align-items: center; gap: var(--space-2);
    }
    .brief-title {
      font-size: var(--text-3xl); font-weight: 700; letter-spacing: -0.03em;
      line-height: 1.2; margin-bottom: var(--space-2);
    }
    .brief-subtitle {
      font-size: var(--text-sm); color: var(--text-secondary); line-height: 1.6;
    }

    /* ── Signal entry ────────────────────────────────────────── */
    .signal-list { margin-top: var(--space-6); }
    .signal-entry {
      padding: var(--space-5) 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .signal-entry:last-child { border-bottom: none; }
    .se-header { display: flex; align-items: center; gap: var(--space-2); margin-bottom: var(--space-3); flex-wrap: wrap; }
    .se-rank {
      font-family: var(--font-mono); font-size: 10px; font-weight: 700;
      color: var(--text-tertiary); background: var(--surface-mid);
      padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
    }
    .se-urgency {
      font-size: var(--text-sm); font-weight: 600;
      padding: 2px 6px; flex-shrink: 0;
    }
    .se-topic { font-size: var(--text-lg); font-weight: 700; color: var(--text-primary); }
    .se-stage-text {
      font-size: var(--text-sm); color: var(--text-tertiary);
      font-family: var(--font-mono); text-transform: uppercase;
    }
    .se-decision {
      font-size: var(--text-sm); color: var(--text-primary); line-height: 1.5;
      margin-bottom: var(--space-2); padding: var(--space-2) var(--space-3);
      background: rgba(45,125,210,0.06); border-left: 3px solid var(--brand);
      border-radius: var(--radius-md);
    }
    .se-action {
      font-size: var(--text-sm); color: var(--text-secondary); line-height: 1.5;
      margin-bottom: var(--space-2); padding: var(--space-2) var(--space-3);
      background: rgba(34,197,94,0.06); border-left: 3px solid #22c55e;
      border-radius: var(--radius-md);
    }
    .se-agent {
      font-size: var(--text-xs); color: var(--text-secondary); line-height: 1.5;
      font-family: var(--font-mono); padding: var(--space-2) var(--space-3);
      background: rgba(255,255,255,0.02); border: 1px solid var(--border-subtle);
      border-radius: var(--radius-md); margin-bottom: var(--space-2);
    }
    .se-escalation {
      font-size: var(--text-xs); color: var(--text-secondary); line-height: 1.5;
      padding: var(--space-2) var(--space-3);
      background: rgba(245, 158, 11, 0.06); border-left: 3px solid #f59e0b;
      border-radius: var(--radius-md); margin-bottom: var(--space-2);
    }
    .se-reversal {
      font-size: var(--text-xs); color: var(--text-secondary); line-height: 1.5;
      padding: var(--space-2) var(--space-3);
      background: rgba(239, 68, 68, 0.06); border-left: 3px solid #ef4444;
      border-radius: var(--radius-md); margin-bottom: var(--space-2);
    }
    .se-meta {
      display: flex; flex-wrap: wrap; gap: var(--space-4);
      font-size: 10px; color: var(--text-tertiary);
      font-family: var(--font-mono); text-transform: uppercase;
      letter-spacing: 0.05em; padding-top: var(--space-3);
      border-top: 1px dashed var(--border-subtle);
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .brief-footer {
      margin-top: var(--space-10); padding-top: var(--space-6);
      border-top: 1px solid var(--border-subtle);
      font-size: var(--text-xs); color: var(--text-tertiary);
      font-family: var(--font-mono); text-align: center;
    }

    /* ── Loading state ─────────────────────────────────────── */
    .loading-brief { text-align: center; padding: var(--space-16); color: var(--text-tertiary); }
    .skeleton-line {
      height: 12px; border-radius: 6px;
      background: linear-gradient(90deg, var(--surface-low) 25%, rgba(255,255,255,0.04) 50%, var(--surface-low) 75%);
      background-size: 200% 100%; animation: shimmer 1.5s infinite;
      margin-bottom: var(--space-3);
    }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    /* ── Print styles ─────────────────────────────────────── */
    @media print {
      nav, .brief-actions, .no-print { display: none !important; }
      body { background: white; color: black; }
      .brief-layout { max-width: 100%; padding: 0; }
      .brief-header { border-bottom: 2px solid black; }
      .signal-entry { border-bottom: 1px solid #ccc; page-break-inside: avoid; }
      .se-decision, .se-action, .se-agent { background: none !important; border-left: 2px solid #333 !important; }
      .se-header { margin-bottom: 8px; }
      a { text-decoration: none; color: black; }
      body { font-size: 12pt; }
    }

    @media (max-width: 640px) {
      .brief-layout { padding: 0 var(--space-4); }
      .brief-title { font-size: var(--text-2xl); }
      .se-header { flex-wrap: wrap; }
      .se-topic { width: 100%; margin-top: var(--space-1); }
    }
  </style>
</head>
<body>

<nav class="no-print">
  <div style="max-width:1200px;margin:0 auto;padding:0 var(--space-8);height:60px;display:flex;align-items:center;justify-content:space-between;gap:var(--space-6);">
    <a href="/" style="display:flex;align-items:center;gap:var(--space-3);text-decoration:none;">
      <div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--brand),#1a5fa8);display:flex;align-items:center;justify-content:center;">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 10L5 6L7.5 8.5L10.5 4L12 6" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </div>
      <span style="font-weight:600;font-size:var(--text-sm);letter-spacing:-0.01em;">Signal Market</span>
    </a>
    <div style="display:flex;align-items:center;gap:var(--space-6);">
      <a href="/signals" style="font-size:var(--text-sm);color:var(--text-secondary);text-decoration:none;">Signals</a>
      <a href="/graph" style="font-size:var(--text-sm);color:var(--text-secondary);text-decoration:none;">Graph</a>
      <a href="/watchlist" style="font-size:var(--text-sm);color:var(--text-secondary);text-decoration:none;">Watchlist</a>
      <a href="/brief" style="font-size:var(--text-sm);color:var(--text-primary);font-weight:500;text-decoration:none;border-bottom:2px solid var(--brand);padding-bottom:2px;">Brief</a>
    </div>
    <div style="display:flex;align-items:center;gap:var(--space-3);">
      <span class="live-dot"></span>
      <span style="font-size:var(--text-xs);color:var(--text-tertiary);font-family:var(--font-mono);">LIVE</span>
    </div>
  </div>
</nav>

<div class="brief-layout" id="brief-root">
  <div class="loading-brief">
    <div class="skeleton-line" style="width:60%;height:32px;margin-bottom:8px"></div>
    <div class="skeleton-line" style="width:80%;height:16px"></div>
    <div class="skeleton-line" style="width:40%;height:16px"></div>
  </div>
</div>

<script>
const STAGE_COLORS = {
  accelerating: '#22c55e', forming: '#f59e0b', emerging: '#60a5fa',
  peak: '#f97316', fading: '#6b7280', weak: '#4b5563',
};

let urgencyFilterEnabled = false;
let cachedBriefData = null;

function formatDate(iso) {
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
}

function getUrgencyClass(urgency) {
  if (urgency === 'high') return 'urgency-high';
  if (urgency === 'medium') return 'urgency-medium';
  return 'urgency-low';
}

function renderSignalEntry(s) {
  const conf = Math.round((s.confidence || 0) * 100);
  const sources = (s.sources || []).slice(0, 3).join(', ');
  const urgencyIcon = s.urgency === 'high' ? '🔴' : s.urgency === 'medium' ? '🟡' : '⚪';
  const urgencyLabel = s.urgency.toUpperCase();
  return `
  <div class="signal-entry">
    <div class="se-header">
      <span class="se-rank">#${s.rank}</span>
      <span class="se-urgency">[${urgencyIcon} ${urgencyLabel}]</span>
      <span class="se-topic">${s.topic}</span>
      <span class="se-stage-text">— ${s.stage}</span>
    </div>
    ${s.decision_question ? `<div class="se-decision"><strong>DECISION:</strong> ${s.decision_question}</div>` : ''}
    ${s.next_best_action ? `<div class="se-action"><strong>ACTION:</strong> ${s.next_best_action}</div>` : ''}
    ${s.agent_action ? `<div class="se-agent"><strong>AGENT ACTION:</strong> ${s.agent_action}</div>` : ''}
    ${s.escalation_condition ? `<div class="se-escalation"><strong>ESCALATION:</strong> ${s.escalation_condition}</div>` : ''}
    ${s.reversal_condition ? `<div class="se-reversal"><strong>REVERSAL:</strong> ${s.reversal_condition}</div>` : ''}
    <div class="se-meta">
      <span>WINDOW: ${s.window || '—'}</span>
      <span>CONFIDENCE: ${conf}%</span>
      <span>SOURCES: ${sources || '—'}</span>
    </div>
  </div>`;
}

function renderBrief(data, filterHighUrgency = false) {
  const allSignals = data.top_signals || [];
  const signals = filterHighUrgency ? allSignals.filter(s => s.urgency === 'high') : allSignals;
  const now = new Date().toISOString();
  const dateStr = formatDate(now);

  if (!signals.length) {
    document.getElementById('brief-root').innerHTML = `
      <div class="brief-header">
        <div class="brief-date"><span class="live-dot"></span> ${dateStr}</div>
        <h1 class="brief-title">Daily Intelligence Brief</h1>
        <p class="brief-subtitle">No signals available at this time. Check back when the daily pipeline completes.</p>
      </div>
      <div style="padding:var(--space-6);text-align:center;color:var(--text-tertiary)">
        <a href="/signals" class="action-btn" style="display:inline-flex;margin-top:var(--space-4)">Browse Signals →</a>
      </div>`;
    return;
  }

  const signalsHtml = signals.map(renderSignalEntry).join('');

  document.getElementById('brief-root').innerHTML = `
    <div class="brief-actions no-print">
      <button class="action-btn" onclick="window.print()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V2h12v7"/><path d="M6 18H4a2 2 0 01-2-2v-5a2 2 0 012-2h16a2 2 0 012 2v5a2 2 0 01-2 2h-2"/><path d="M6 14h12v8H6z"/></svg>
        Print Brief
      </button>
      <button class="action-btn" onclick="copyAsMarkdown()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 4h2a2 2 0 012 2v14a2 2 0 01-2 2H6a2 2 0 01-2-2V6a2 2 0 012-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>
        Copy as Markdown
      </button>
      <button class="action-btn" onclick="copyAsJson()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        Copy as JSON
      </button>
      <button class="action-btn" onclick="shareUrl()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
        Share
      </button>
      <label class="filter-toggle" id="urgency-filter">
        <input type="checkbox" onchange="toggleUrgencyFilter(this.checked)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><circle cx="12" cy="12" r="10"/><path d="M12 2v10l4.24 4.24"/></svg>
        High Urgency Only
      </label>
    </div>

    <div class="brief-header">
      <div class="brief-date"><span class="live-dot"></span> ${dateStr}</div>
      <h1 class="brief-title">Signal Market — Daily Intelligence Brief</h1>
      <p class="brief-subtitle">Top ${signals.length} signals ranked by urgency and confidence${filterHighUrgency ? ' (high urgency only)' : ''}</p>
    </div>

    <div class="signal-list">
      ${signalsHtml}
    </div>

    <div class="brief-footer">
      Generated ${new Date().toLocaleString()} · Signal Market · signal-market.pages.dev
    </div>`;
}

function generateMarkdown(data) {
  const signals = data.top_signals || [];
  const dateStr = new Date().toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

  let md = `# Signal Market — Daily Intelligence Brief\n\n`;
  md += `**${dateStr}**\n\n`;
  md += `*Top ${signals.length} signals ranked by urgency and confidence*\n\n---\n\n`;

  signals.forEach(s => {
    const conf = Math.round((s.confidence || 0) * 100);
    md += `## #${s.rank} [${s.urgency.toUpperCase()}] ${s.topic}\n\n`;
    if (s.decision_question) md += `**Decision:** ${s.decision_question}\n\n`;
    if (s.next_best_action) md += `**Action:** ${s.next_best_action}\n\n`;
    if (s.agent_action) md += `**Agent:** ${s.agent_action}\n\n`;
    md += `--- Window: ${s.window || '—'} | Confidence: ${conf}%\n\n`;
  });

  md += `\n*Generated ${new Date().toLocaleString()} · Signal Market*\n`;
  return md;
}

async function copyAsMarkdown() {
  try {
    const res = await fetch('/api/v2/agent-brief?limit=10');
    const data = await res.json();
    const md = generateMarkdown(data);
    await navigator.clipboard.writeText(md);
    alert('✓ Brief copied as Markdown to clipboard');
  } catch (e) {
    alert('Failed to copy brief. Please try again.');
  }
}

async function copyAsJson() {
  try {
    const res = await fetch('/api/v2/agent-brief?limit=10');
    const data = await res.json();
    await navigator.clipboard.writeText(JSON.stringify(data, null, 2));
    alert('✓ Brief copied as JSON to clipboard');
  } catch (e) {
    alert('Failed to copy JSON. Please try again.');
  }
}

async function shareUrl() {
  try {
    const url = window.location.href;
    await navigator.clipboard.writeText(url);
    alert('✓ URL copied to clipboard');
  } catch (e) {
    alert('Failed to copy URL. Please try again.');
  }
}

function toggleUrgencyFilter(enabled) {
  urgencyFilterEnabled = enabled;
  if (cachedBriefData) {
    renderBrief(cachedBriefData, urgencyFilterEnabled);
  }
}

async function loadBrief() {
  try {
    const res = await fetch('/api/v2/agent-brief?limit=10');
    const data = await res.json();
    cachedBriefData = data;
    renderBrief(data, urgencyFilterEnabled);
  } catch (e) {
    document.getElementById('brief-root').innerHTML = `
      <div class="brief-header">
        <h1 class="brief-title">Daily Intelligence Brief</h1>
        <p class="brief-subtitle" style="color:#ef4444">Unable to load brief. Please check your connection.</p>
      </div>`;
  }
}

loadBrief();
</script>
</body>
</html>
