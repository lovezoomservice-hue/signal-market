name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: |
          # Test that L1 modules can be loaded
          node -e "
            const td = require('./l1/topic_discovery.js');
            const pe = require('./l1/prediction_engine.js');
            console.log('✅ L1 modules loaded successfully');
            console.log('✅ Topic Discovery:', typeof td.processTrendGraph);
            console.log('✅ Prediction Engine:', typeof pe.predictTrends);
          "
      
      - name: Verify API structure
        run: |
          # Verify API files exist
          ls -la api/*.js
          echo "✅ All API files exist"

  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Environment Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

  notify:
    runs-on: ubuntu-latest
    needs: [test, deploy]
    if: always()
    
    steps:
      - name: CI summary
        run: |
          echo "## CI Results Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Test job: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Deploy job: ${{ needs.deploy.result }}" >> $GITHUB_STEP_SUMMARY
