name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  PRODUCTION_PUBLIC_DOMAIN: 'https://signal-market.vercel.app'

jobs:
  # ==================== STAGE 1: LINT ====================
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run ESLint
        run: npm run lint || true
        continue-on-error: true
      
      - name: Check formatting
        run: npm run format:check || true

  # ==================== STAGE 2: UNIT TESTS ====================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run unit tests
        run: npm run test:unit --if-present || echo "No unit tests configured"
        continue-on-error: true
      
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage/coverage-final.json
          fail_ci_if_error: false

  # ==================== STAGE 3: INTEGRATION TESTS ====================
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Run integration tests
        run: npm run test:integration --if-present || echo "No integration tests configured"
        continue-on-error: true
      
      - name: Test API modules
        run: |
          node -e "
            const fs = require('fs');
            const files = fs.readdirSync('./api').filter(f => f.endsWith('.js'));
            console.log('Testing ' + files.length + ' API files...');
            files.forEach(f => console.log('  - ' + f));
          "

  # ==================== STAGE 4: BUILD ====================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, integration-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Verify Vercel config
        run: cat vercel.json
      
      - name: Verify API structure
        run: ls -la api/

  # ==================== STAGE 5: DEPLOY PREVIEW ====================
  deploy-preview:
    name: Deploy Preview
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'pull_request'
    environment: preview
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Info
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Deploy to Preview
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} | tail -1)
          echo "preview_url=$URL" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Comment PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const previewUrl = '${{ steps.deploy.outputs.preview_url }}';
            if (previewUrl && !previewUrl.includes('error')) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `✅ Preview deployed: ${previewUrl}`
              });
            }

  # ==================== STAGE 6: E2E TESTS (Preview) ====================
  e2e-tests-preview:
    name: E2E Tests (Preview)
    runs-on: ubuntu-latest
    needs: [deploy-preview]
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Run E2E Tests
        run: |
          echo "Running E2E tests against preview..."
          npm run test:e2e --if-present || echo "No E2E tests configured"
        continue-on-error: true

  # ==================== STAGE 7: DEPLOY PRODUCTION ====================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    outputs:
      production_url: ${{ steps.deploy.outputs.production_url }}
      deploy_blocked: ${{ steps.deploy.outputs.deploy_blocked }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      
      - name: Install Vercel CLI
        run: npm install -g vercel@latest
      
      - name: Pull Vercel Info
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
      
      - name: Build Project
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

        
      - name: Deploy to Vercel
        id: deploy
        run: |
          set +e
          DEPLOY_OUTPUT=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} 2>&1)
          DEPLOY_EXIT=$?
          set -e

          echo "$DEPLOY_OUTPUT"

          URL=$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'Production: https://[^[:space:]]+\.vercel\.app' | head -n 1 | sed 's/^Production: //')
          if [ -z "$URL" ]; then
            URL=$(printf '%s\n' "$DEPLOY_OUTPUT" | sed '/^[[:space:]]*$/d' | grep -Eo 'https://[^[:space:]]+\.vercel\.app' | head -n 1)
          fi

          if [ $DEPLOY_EXIT -ne 0 ]; then
            if printf '%s' "$DEPLOY_OUTPUT" | grep -q 'api-deployments-young-hobby-team-24h'; then
              echo "⚠️ Vercel deployment quota window reached, mark as blocked and continue workflow"
              echo "deploy_blocked=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "❌ Vercel deploy command failed"
            exit $DEPLOY_EXIT
          fi

          if [ -z "$URL" ]; then
            echo "❌ Failed to capture deployment URL from Vercel output"
            exit 1
          fi

          echo "deploy_blocked=false" >> "$GITHUB_OUTPUT"
          echo "production_url=$URL" >> "$GITHUB_OUTPUT"
          echo "Captured production URL: $URL"
      
      
      - name: Verify Deployment
        if: steps.deploy.outputs.deploy_blocked != 'true'
        run: |
          echo "Waiting for deployment..."
          sleep 30
          URL="${{ steps.deploy.outputs.production_url }}/api/health"
          echo "Checking $URL"
          STATUS=$(curl -s -o /tmp/deploy_health -w "%{http_code}" "$URL")
          if [ "$STATUS" = "200" ]; then
            echo "✅ Deployment verified (200)"
            exit 0
          fi
          if [ "$STATUS" = "401" ]; then
            echo "⚠️ Deployment reachable but protected by Vercel Authentication (401)"
            exit 0
          fi
          echo "❌ Deployment verification failed with status: $STATUS"
          cat /tmp/deploy_health || true
          exit 1
      
      - name: Report Success
        if: steps.deploy.outputs.deploy_blocked != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            console.log('✅ Deployed to production: ${{ steps.deploy.outputs.production_url }}');

      - name: Report Quota Blocked
        if: steps.deploy.outputs.deploy_blocked == 'true'
        run: |
          echo "⚠️ Deployment blocked by Vercel 24h quota window"

  # ==================== STAGE 8: HEALTH CHECK ====================
  health-check:
    name: Health Check
    runs-on: ubuntu-latest
    needs: [deploy-production]
    if: github.ref == 'refs/heads/main' && needs.deploy-production.outputs.deploy_blocked != 'true'
    steps:
      - name: Wait for deployment
        run: sleep 60
      
      - name: Check API health
        run: |
          URL="${{ needs.deploy-production.outputs.production_url }}"
          echo "Checking: $URL/api/health"
          for i in {1..5}; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health")
            if [ "$STATUS" = "200" ]; then
              echo "✅ Health check passed (200)"
              exit 0
            fi
            if [ "$STATUS" = "401" ]; then
              echo "⚠️ Health endpoint reachable but protected (401)"
              exit 0
            fi
            echo "Attempt $i: Status $STATUS"
            sleep 10
          done
          echo "❌ Health check failed"
          exit 1

  # ==================== STAGE 9: PUBLIC READINESS ====================
  public-readiness:
    name: Public Readiness
    runs-on: ubuntu-latest
    needs: [deploy-production, health-check]
    if: github.ref == 'refs/heads/main' && needs.deploy-production.outputs.deploy_blocked != 'true'
    steps:
      - name: Check public production APIs
        run: |
          BASE_URL="${{ env.PRODUCTION_PUBLIC_DOMAIN }}"
          echo "Checking public domain: $BASE_URL"

          check_endpoint() {
            local path="$1"
            local expected="$2"
            local code
            code=$(curl -s -o /tmp/public_check -w "%{http_code}" "$BASE_URL$path")
            echo "$path -> $code (expected $expected)"
            if [ "$code" != "$expected" ]; then
              echo "❌ Public API check failed: $path expected $expected got $code"
              head -c 300 /tmp/public_check || true
              return 1
            fi
            return 0
          }

          check_endpoint "/api/health" "200"
          check_endpoint "/api/signals" "200"
          check_endpoint "/api/events" "200"
          echo "✅ Public readiness passed"

  # ==================== NOTIFICATION ====================
  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [deploy-production, health-check, public-readiness]
    if: always()
    steps:
      - name: Create deployment status
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deploy Job: ${{ needs.deploy-production.result }}" >> $GITHUB_STEP_SUMMARY
          echo "🚦 Deploy Blocked: ${{ needs.deploy-production.outputs.deploy_blocked }}" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment Health: ${{ needs.health-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "🌐 Public Readiness: ${{ needs.public-readiness.result }}" >> $GITHUB_STEP_SUMMARY
