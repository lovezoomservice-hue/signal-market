name: Weekly Research Report

on:
  schedule:
    - cron: '0 10 * * 1'   # Every Monday 10:00 UTC (18:00 CST)
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (no file write)'
        required: false
        default: 'false'

# Service: AI Company OS L2 / SignalResearchAgent (tool-only mode)
# Owner: CEO
# WF: WF-012 Causal chain extraction

jobs:
  weekly-report:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Signal Market pipeline deps
        run: |
          pip install requests 2>/dev/null || true

      - name: Start local API server
        run: |
          npm install --silent 2>&1 | tail -2
          npx vercel dev --listen 3001 &
          sleep 15
          curl -sf http://localhost:3001/api/health && echo "API ready" || echo "API not ready — using JSONL fallback"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        continue-on-error: true

      - name: Run Weekly Research Report (tool-only)
        run: |
          python3 scripts/weekly_research_report.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}

      - name: Commit report
        run: |
          git config user.name  "signal-market-bot"
          git config user.email "bot@signal.market"
          git add output/weekly_research_report_*.json || true
          git diff --staged --quiet && echo "No report changes" && exit 0
          git commit -m "auto: weekly research report $(date +%Y-%m-%d) [skip ci]"
          git push

      - name: Upload report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: weekly-research-report-${{ github.run_number }}
          path: output/weekly_research_report_*.json
          retention-days: 30

      - name: Annotate on failure
        if: failure()
        run: echo "::error title=Weekly Research Report Failed::Run ${{ github.run_id }}"
