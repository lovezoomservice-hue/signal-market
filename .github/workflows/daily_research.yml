name: Daily Research Signal Update

on:
  schedule:
    - cron: '50 9 * * *'   # 17:50 CST = 09:50 UTC
  workflow_dispatch:         # manual trigger for testing

jobs:
  update-signals:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    permissions:
      contents: write        # needed for git push

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── 3. Preflight checks ───────────────────────────────────────────────
      - name: Preflight — verify workspace layout
        run: |
          echo "=== Preflight checks ==="
          test -f scripts/run_full_pipeline_v2.py \
            || { echo "::error::MISSING scripts/run_full_pipeline_v2.py"; exit 1; }
          test -d data  || mkdir -p data
          test -d output || mkdir -p output
          echo "  ✓ run_full_pipeline_v2.py exists"
          echo "  ✓ data/ ready"
          echo "  ✓ output/ ready"
          python3 --version
          echo "Preflight OK"

      # ── 4. Run pipeline (single authoritative runner) ────────────────────
      - name: Run full research + signal pipeline
        id: pipeline
        run: |
          echo "=== Pipeline start: $(date -u +%Y-%m-%dT%H:%M:%SZ) ==="
          python3 scripts/run_full_pipeline_v2.py 2>&1 | tee output/pipeline_ci_$(date +%Y%m%d).log
          EXIT=${PIPESTATUS[0]}
          echo "=== Pipeline exit: $EXIT ==="
          exit $EXIT
        env:
          # Tier-1 secrets (optional — pipeline degrades gracefully if absent)
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          CRYPTOPANIC_API_KEY:  ${{ secrets.CRYPTOPANIC_API_KEY }}
          SERPAPI_API_KEY:      ${{ secrets.SERPAPI_API_KEY }}
          FRED_API_KEY:         ${{ secrets.FRED_API_KEY }}
          PRODUCTHUNT_TOKEN:    ${{ secrets.PRODUCTHUNT_TOKEN }}

      # ── 5. Validate output ────────────────────────────────────────────────
      - name: Validate — signal count and schema
        run: |
          python3 - << 'EOF'
          import json, sys
          with open("data/signals_history.jsonl") as f:
              sigs = [json.loads(l) for l in f if l.strip()]
          valid = [s for s in sigs if s.get("signal_id") and s.get("topic") and s.get("confidence")]
          print(f"Total lines: {len(sigs)}  Valid signals: {len(valid)}")
          if len(valid) < 5:
              print("::error::Pipeline produced fewer than 5 valid signals — aborting commit")
              sys.exit(1)
          # Report top 5
          for s in sorted(valid, key=lambda x: -x.get("confidence",0))[:5]:
              print(f"  {s['signal_id']:<12} conf={s['confidence']} {s['topic']}")
          print("Validation OK")
          EOF

      # ── 6. Upload pipeline log as artifact ───────────────────────────────
      - name: Upload pipeline log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pipeline-log-${{ github.run_number }}
          path: output/pipeline_ci_*.log
          retention-days: 14

      # ── 7. Commit updated JSONL (only if changed) ────────────────────────
      - name: Commit signals_history.jsonl if changed
        run: |
          git config user.name  "signal-market-bot"
          git config user.email "bot@signal.market"
          git add data/signals_history.jsonl
          if git diff --staged --quiet; then
            echo "No signal changes today — nothing to commit"
          else
            SIGNAL_COUNT=$(python3 -c "
          import json
          with open('data/signals_history.jsonl') as f:
              sigs=[json.loads(l) for l in f if l.strip() and json.loads(l).get('signal_id')]
          print(len(sigs))
          ")
            git commit -m "auto: daily signal update $(date +%Y-%m-%d) — ${SIGNAL_COUNT} signals [skip ci]"
            git push
            echo "Committed and pushed ${SIGNAL_COUNT} signals"
          fi

      # ── 8. AutonomousResearchFetcher — degraded-safe post-chain enrichment ──
      # Runs AFTER main chain commits; failure never breaks main chain.
      # Tracks zero-gain runs in output/ar_gain_log.json:
      #   consecutive_no_gain >= 3 → sets AR_SKIP_WEEKLY flag → only runs on Mondays.
      - name: Autonomous Research Enrichment (degraded-safe)
        continue-on-error: true
        run: |
          DATE=$(date +%Y-%m-%d)
          GAIN_LOG="output/ar_gain_log.json"
          DAY_OF_WEEK=$(date +%u)   # 1=Mon ... 7=Sun

          # Read consecutive no-gain counter
          CONSEC=0
          if [ -f "$GAIN_LOG" ]; then
            CONSEC=$(python3 -c "import json; d=json.load(open('$GAIN_LOG')); print(d.get('consecutive_no_gain',0))")
          fi

          # If 3+ consecutive no-gain: only run on Mondays (weekly degradation)
          if [ "$CONSEC" -ge 3 ] && [ "$DAY_OF_WEEK" != "1" ]; then
            echo "AR: downgraded to weekly (consecutive_no_gain=$CONSEC). Skipping today (day=$DAY_OF_WEEK)."
            exit 0
          fi

          echo "AR: running autonomous_research.py (consec_no_gain=$CONSEC)..."
          BEFORE=$(md5sum data/signals_history.jsonl 2>/dev/null | cut -d' ' -f1 || echo "none")

          python3 scripts/autonomous_research.py 2>&1 | tail -10

          AFTER=$(md5sum data/signals_history.jsonl 2>/dev/null | cut -d' ' -f1 || echo "none")

          # Determine gain
          if [ "$BEFORE" != "$AFTER" ]; then
            echo "AR: JSONL changed — gain detected, reset counter"
            NEW_CONSEC=0
          else
            NEW_CONSEC=$((CONSEC + 1))
            echo "AR: no JSONL change — consecutive_no_gain now $NEW_CONSEC"
          fi

          # Update gain log
          python3 -c "
          import json, os
          path='$GAIN_LOG'
          d = json.load(open(path)) if os.path.exists(path) else {}
          d['consecutive_no_gain'] = $NEW_CONSEC
          d['last_run'] = '$DATE'
          d['mode'] = 'weekly' if $NEW_CONSEC >= 3 else 'daily'
          open(path,'w').write(json.dumps(d, indent=2))
          print(f'AR gain_log: {d}')
          "

          # Commit enriched JSONL + gain log if changed
          git add data/signals_history.jsonl output/ar_gain_log.json || true
          git diff --staged --quiet && echo "AR: nothing to commit" && exit 0
          git commit -m "auto: autonomous research enrichment $DATE [skip ci]"
          git push

      # ── 9. World Signals Fetch (L0-L3 multi-layer, degraded-safe) ───────────
      # HN + BBC/NYT/TechCrunch/Verge (L1) + Reddit (L2) + Polymarket (L3)
      # Runs post-AR; failure never blocks main chain.
      - name: World Signals Fetch (L0-L1-L2-L3-L5, degraded-safe)
        continue-on-error: true
        run: |
          DATE=$(date +%Y-%m-%d)
          pip install requests 2>/dev/null || true
          echo "Running world signals fetch..."
          python3 scripts/fetch_world_signals.py 2>&1 | tail -15
          git add output/world_signals_*.json data/signals_history.jsonl || true
          git diff --staged --quiet && echo "WS: nothing to commit" && exit 0
          git commit -m "auto: world signals fetch $DATE (HN+News+Reddit+Polymarket+ProJudgment) [skip ci]"
          git push

      # ── 10. Failure annotation ────────────────────────────────────────────
      - name: Annotate failure summary
        if: failure()
        run: |
          echo "::error title=Daily Research Signal Update Failed::Check pipeline log artifact for details. Run: ${{ github.run_id }}"
          if [ -f output/pipeline_ci_$(date +%Y%m%d).log ]; then
            echo "=== Last 30 lines of pipeline log ==="
            tail -30 output/pipeline_ci_$(date +%Y%m%d).log
          fi
