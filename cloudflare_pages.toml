name = "signal-market"
compatibility_date = "2024-01-01"

[site]
bucket = "./ui"
pages_build_output_dir = "./ui"

[[env]]
name = "production"

[[env.secrets]]
name = "API_KEY"
help_text = "Your Signal Market API Key"

[[env.secrets]]
name = "AUTH_ENABLED"
help_text = "Enable API authentication"

[[kv_namespaces]]
binding = "EVENTS"
id = "YOUR_KV_NAMESPACE_ID"

[[d1_databases]]
binding = "DB"
database_name = "signal-market"
database_id = "YOUR_D1_DATABASE_ID"
