name = "signal-market"
compatibility_date = "2024-01-01"

[observability]
enabled = true

# Workers 部署配置
[build]
command = ""
cwd = "."

# KV 命名空间
[[kv_namespaces]]
binding = "EVENTS"
id = ""  # 部署时创建

# D1 数据库
[[d1_databases]]
binding = "DB"
database_name = "signal-market"
database_id = ""  # 部署时创建

# 环境变量
[env.production]
name = "production"

[[env.production.kv_namespaces]]
binding = "EVENTS"
id = ""  # 生产 KV ID

[[env.production.d1_databases]]
binding = "DB"
database_name = "signal-market"
database_id = ""  # 生产 D1 ID
